services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: marketdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketdata"]
      interval: 5s
      timeout: 5s
      retries: 10

  marketdata:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=marketdata;Username=postgres;Password=postgres
    restart: unless-stopped

volumes:
  postgres-data:
